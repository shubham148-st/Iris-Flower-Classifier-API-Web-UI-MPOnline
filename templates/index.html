<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Classifier | Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }

        /* Animated background mesh gradient */
        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, rgba(79, 70, 229, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(6, 182, 212, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
            animation: meshAnimation 15s ease-in-out infinite alternate;
        }

        @keyframes meshAnimation {
            0% { transform: scale(1); }
            50% { transform: scale(1.05) translate(2%, 2%); }
            100% { transform: scale(1) translate(-2%, -2%); }
        }

        /* Glassmorphism card */
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Input styling */
        .glass-input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f8fafc;
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            outline: none;
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            background: rgba(15, 23, 42, 0.8);
        }

        /* Custom Button */
        .btn-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
        }
        .btn-gradient:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.6);
            filter: brightness(1.1);
        }
        .btn-gradient:active {
            transform: translateY(1px);
        }

        /* Result container animation */
        .result-reveal {
            animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-8 relative">
    
    <div class="bg-mesh"></div>

    <div class="w-full max-w-lg glass-card rounded-2xl p-6 sm:p-10 relative overflow-hidden">
        <!-- Decorative blob top right -->
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
        <!-- Decorative blob bottom left -->
        <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-fuchsia-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>

        <div class="relative z-10">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-indigo-500/10 text-indigo-400 mb-4">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path>
                    </svg>
                </div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-fuchsia-400">Iris Predictor</h1>
                <p class="text-slate-400 mt-2 text-sm">Enter the dimensions below to predict the Iris species using advanced ML</p>
            </div>

            <form id="predictionForm" class="space-y-5">
                <div class="grid grid-cols-2 gap-5">
                    <div class="space-y-1.5">
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Sepal Length</label>
                        <input type="number" step="0.1" name="sepal_length" required 
                               placeholder="e.g. 5.1"
                               class="w-full px-4 py-3 rounded-xl glass-input text-sm">
                    </div>
                    <div class="space-y-1.5">
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Sepal Width</label>
                        <input type="number" step="0.1" name="sepal_width" required 
                               placeholder="e.g. 3.5"
                               class="w-full px-4 py-3 rounded-xl glass-input text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-5">
                    <div class="space-y-1.5">
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Petal Length</label>
                        <input type="number" step="0.1" name="petal_length" required 
                               placeholder="e.g. 1.4"
                               class="w-full px-4 py-3 rounded-xl glass-input text-sm">
                    </div>
                    <div class="space-y-1.5">
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Petal Width</label>
                        <input type="number" step="0.1" name="petal_width" required 
                               placeholder="e.g. 0.2"
                               class="w-full px-4 py-3 rounded-xl glass-input text-sm">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full btn-gradient text-white font-semibold py-3.5 px-4 rounded-xl text-sm mt-4 flex items-center justify-center gap-2">
                    <span>Classify Species</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                </button>
            </form>

            <div id="resultBox" class="hidden mt-8 p-5 rounded-xl border relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-r from-indigo-500/10 to-purple-500/10"></div>
                <div class="relative z-10 flex items-center justify-center gap-3">
                    <div id="resultIcon"></div>
                    <div>
                        <p class="text-xs text-slate-400 uppercase tracking-wider mb-0.5">Predicted Species</p>
                        <p id="resultText" class="text-xl font-bold"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('predictionForm');
        const submitBtn = document.getElementById('submitBtn');
        const submitText = submitBtn.querySelector('span');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const resultBox = document.getElementById('resultBox');
            const resultText = document.getElementById('resultText');
            const resultIcon = document.getElementById('resultIcon');
            
            // UI Loading state
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
            submitText.innerText = "Analyzing...";
            resultBox.classList.add('hidden');
            resultBox.classList.remove('result-reveal');

            const formData = new FormData(e.target);
            const payload = {
                sepal_length: parseFloat(formData.get('sepal_length')),
                sepal_width: parseFloat(formData.get('sepal_width')),
                petal_length: parseFloat(formData.get('petal_length')),
                petal_width: parseFloat(formData.get('petal_width'))
            };

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                
                resultBox.className = 'mt-8 p-5 rounded-xl border relative overflow-hidden result-reveal';
                
                if (response.ok) {
                    resultBox.classList.add('border-indigo-500/30', 'bg-indigo-900/20');
                    resultText.className = "text-indigo-300 font-bold text-xl";
                    resultText.innerText = data.class;
                    resultIcon.innerHTML = `<svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
                } else {
                    throw new Error(data.error || 'Server processing error');
                }
            } catch (err) {
                resultBox.className = 'mt-8 p-5 rounded-xl border relative overflow-hidden result-reveal border-red-500/30 bg-red-900/20';
                resultText.className = "text-red-400 font-medium text-base";
                resultText.innerText = err.message;
                resultIcon.innerHTML = `<svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            } finally {
                // Restore UI state
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                submitText.innerText = "Classify Species";
            }
        });
    </script>
</body>
</html>
